name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Work around pnpm optional dependency bug (Tailwind CSS oxide Linux binary)
        run: pnpm install -w story-spark-ai-frontend --no-save @tailwindcss/oxide-linux-x64-gnu

      - name: Build backend
        run: pnpm --filter story-spark-ai-backend build

      - name: Build frontend
        run: pnpm --filter story-spark-ai-frontend build
